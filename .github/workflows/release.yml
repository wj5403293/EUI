name: release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            archive: zip
          - os: ubuntu-latest
            platform: linux
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: install linux deps
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libgl1-mesa-dev
      - name: configure windows
        if: matrix.platform == 'windows'
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
      - name: configure linux
        if: matrix.platform == 'linux'
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DGLFW_BUILD_WAYLAND=OFF -DGLFW_BUILD_X11=ON
      - name: build
        run: cmake --build build --config Release --parallel
      - name: package windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $label = "${{ github.ref_name }}"
          $label = $label -replace '[^A-Za-z0-9._-]', '-'
          $out = "dist/EUI-NEO-$label-windows-x64.zip"
          $items = @()
          $items += Get-ChildItem build -Recurse -Filter *.exe -File
          if ($items.Count -eq 0) { throw "No .exe outputs found in build directory." }
          $items += Get-ChildItem build -Recurse -Filter glfw*.dll -File
          if (Test-Path build/Release/font) { $items += Get-Item build/Release/font }
          Compress-Archive -Path $items.FullName -DestinationPath $out -Force
      - name: package linux
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          mkdir -p dist
          label="$(echo "${GITHUB_REF_NAME}" | tr -cs 'A-Za-z0-9._-' '-')"
          out="dist/EUI-NEO-${label}-linux-x64.tar.gz"
          mapfile -t bins < <(find build -maxdepth 1 -type f \( -name 'eui_neo' -o -name 'app_*' \))
          files=("${bins[@]}")
          if [ -d build/font ]; then
            files+=("build/font")
          fi
          tar -czf "$out" "${files[@]}"
      - uses: actions/upload-artifact@v5
        with:
          name: release-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
