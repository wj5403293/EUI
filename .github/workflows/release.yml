name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create or update, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

jobs:
  prepare_release:
    name: Prepare Release
    runs-on: ubuntu-latest

    steps:
      - name: Ensure GitHub release exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
          gh release create "$RELEASE_TAG" --target "$GITHUB_SHA" --generate-notes

  build:
    name: Build ${{ matrix.name }}
    needs: prepare_release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            cmake_generator: "Visual Studio 17 2022"
            cmake_args: "-A x64"
            config: Release
            cpack_generator: ZIP
            artifact_glob: "dist/*.zip"
          - name: linux-x86_64
            os: ubuntu-latest
            cmake_generator: Ninja
            cmake_args: ""
            config: Release
            cpack_generator: TGZ
            artifact_glob: "dist/*.tar.gz"

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config xorg-dev libgl1-mesa-dev

      - name: Configure
        shell: bash
        run: >
          cmake -S . -B build
          -G "${{ matrix.cmake_generator }}"
          ${{ matrix.cmake_args }}
          -DEUI_BUILD_EXAMPLES=ON
          -DEUI_FETCH_GLFW_FROM_GIT=ON
          -DGLFW_BUILD_WAYLAND=OFF
          -DCPACK_PACKAGE_FILE_NAME=EUI-${RELEASE_TAG}-${{ matrix.name }}

      - name: Build
        run: cmake --build build --config ${{ matrix.config }}

      - name: Package
        run: cpack --config build/CPackConfig.cmake -C ${{ matrix.config }} -G ${{ matrix.cpack_generator }} -B dist

      - name: Upload package to GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_GLOB: ${{ matrix.artifact_glob }}
        run: |
          $files = Get-ChildItem -Path $env:ARTIFACT_GLOB
          if (-not $files) {
            throw "No packaged artifacts matched: $env:ARTIFACT_GLOB"
          }

          $paths = $files | ForEach-Object { $_.FullName }
          gh release upload $env:RELEASE_TAG $paths --clobber
